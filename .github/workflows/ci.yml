# .github/workflows/ci.yml
 
# Continuous Integration (CI) Workflow
name: ci
 
on:
  push:
    branches: [ main ]
    paths: [ 'Lab3/**', '.github/workflows/ci.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'Lab3/**', '.github/workflows/ci.yml' ]
  workflow_dispatch:  # gives you the "Run workflow" button

defaults:
  run:
    working-directory: Lab3   # <-- PLEASE run inside Lab3/ :D


jobs:
  lint:
    # Give your job a name that will show up in the GitHub Actions web UI
    name: ESLint
    # We'll run this on a Linux (Ubuntu) VM, since we'll deploy on Linux too.
    runs-on: ubuntu-latest
    # We run these steps one after the other, and if any fail, we stop the process
    steps:
      - name: Check out code
        uses: actions/checkout@v4
 
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          # Use node LTS http://localhost:8080
          node-version: 'lts/*'
          # Cache npm dependencies so they don't have to be downloaded next time - http://localhost:8080
          cache: 'npm'
 
      - name: Install node dependencies
        # Use `ci` vs. `install`, see http://localhost:8080
        run: npm ci
 
 
      - name: Run ESLint
        run: npm run lint