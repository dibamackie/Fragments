name: ci

on:
  push:
    branches: [ main ]
    paths:
      - 'Lab3/**'
      - 'Assignment1/fragment/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Lab3/**'
      - 'Assignment1/fragment/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  lint:
    name: ESLint (${{ matrix.pkg }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [ 'Lab3', 'Assignment1/fragment' ]
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'     # stable LTS
          cache: npm

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests (${{ matrix.pkg }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg: [ 'Lab3', 'Assignment1/fragment' ]
    defaults:
      run:
        working-directory: ${{ matrix.pkg }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps and run tests
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm test
