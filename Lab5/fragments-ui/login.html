<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fragments UI</title>
    <link rel="stylesheet" href="https://unpkg.com/bamboo.css" />
  </head>
  <body>
    <h1>Fragments UI</h1>
    <section>
      <nav>
        <button id="login">Login</button>
      </nav>
    </section>
    <section hidden id="user">
      <h2>Hello <span class="username"></span>!</h2>
    </section>
    <!-- HTML Fragment Creation UI -->
    <section id="create-fragment" hidden>
      <textarea id="fragment-text" placeholder="Enter your fragment here..."></textarea>
      <button id="submit-fragment">Create Fragment</button>
    </section>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
